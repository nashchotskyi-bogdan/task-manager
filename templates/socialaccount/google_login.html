{% load socialaccount %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Social Login</title>

    <style>
        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #1b1642, #070a1a 70%);
            color: #e5e7eb;
        }

        .box {
            width: 380px;
            padding: 30px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(139, 92, 246, 0.25);
            backdrop-filter: blur(14px);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        h2 {
            color: white;
            margin-bottom: 10px;
        }

        .btn {
            display: block;
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .back {
            margin-top: 15px;
            display: block;
            font-size: 13px;
            color: #94a3b8;
            text-decoration: none;
        }

        .back:hover {
            color: white;
        }
    </style>
</head>

<body>
<div class="box">
    <h2>Continue login</h2>
    <p>Sign in using your Google account</p>

    {% providers_media_js %}

    {% for provider in socialaccount.providers %}
        {% if provider.id == "google" %}
            <a class="btn" href="{% provider_login_url 'google' %}">
                Continue with Google
            </a>
        {% endif %}
    {% endfor %}

    <a class="back" href="/accounts/login/">
        ← Back
    </a>
</div>
</body>
</html>
