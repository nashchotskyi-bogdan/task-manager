<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
body{
    margin:0;
    font-family:Inter,Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top,#1b1642,#070a1a 70%);
    color:#e5e7eb;
}
.auth-box{
    width:100%;
    max-width:420px;
    background:rgba(15,23,42,.85);
    border:1px solid rgba(139,92,246,.25);
    backdrop-filter:blur(14px);
    border-radius:18px;
    padding:30px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
}
h3{
    margin-bottom:20px;
}
input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    background:rgba(2,6,23,.9);
    border:1px solid rgba(139,92,246,.3);
    border-radius:12px;
    color:white;
    outline:none;
}
input:focus{
    border-color:#8b5cf6;
    box-shadow:0 0 0 3px rgba(139,92,246,.2);
    background:rgba(2,6,23,.9);
    color:white;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#6366f1,#8b5cf6);
    color:white;
    font-weight:600;
    cursor:pointer;
}
button:hover{
    opacity:.9;
}
.toggle{
    text-align:center;
    margin-top:14px;
    color:#a5b4fc;
    cursor:pointer;
}
#error{
    color:#f87171;
    margin-top:12px;
}
    </style>
</head>
<body>
<div class="auth-box">
    <h3 id="title">Login</h3>
    <input id="username" placeholder="Username">
    <input id="email" placeholder="Email" style="display:none;">
    <input id="password" type="password" placeholder="Password">
    <button onclick="submitForm()">Continue</button>
    <p id="error"></p>
    <div class="toggle" id="toggleText" onclick="toggleMode()">
        Switch to Register
    </div>
</div>
<script>
let isLogin = true;
function toggleMode(){
    isLogin = !isLogin;
    document.getElementById("title").innerText =
        isLogin ? "Login" : "Register";
    document.getElementById("email").style.display =
        isLogin ? "none" : "block";
    document.getElementById("toggleText").innerText =
        isLogin ? "Switch to Register" : "Switch to Login";
    document.getElementById("error").innerText = "";
}
async function submitForm(){
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    let url = "";
    let body = {};
    if(isLogin){
        url = "/api/token/";
        body = {
            username,
            password
        };
    }
    else{
        url = "/api/register/";
        body = {
            username,
            email,
            password
        };
    }
    const res = await fetch(url,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(body)
    });
    const data = await res.json();
    if(!res.ok){
        document.getElementById("error").innerText =
            data.detail || "Something went wrong";
        return;
    }
    localStorage.setItem("access", data.access);
    localStorage.setItem("refresh", data.refresh);
    window.location.href = "/app/";
}
</script>
</body>
</html>
