<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        *{
            box-sizing: border-box;
        }
        body{
            margin:0;
            font-family:Inter,Arial,sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:radial-gradient(circle at top,#1b1642,#070a1a 70%);
            color:#e5e7eb;
        }
        .auth-box{
            width:100%;
            max-width:420px;
            background:rgba(15,23,42,.85);
            border:1px solid rgba(139,92,246,.25);
            backdrop-filter:blur(14px);
            border-radius:18px;
            padding:30px;
            box-shadow:0 20px 60px rgba(0,0,0,.5);
        }
        h3{ margin-bottom:20px; }
        input{ width:100%; padding:12px; margin-bottom:12px; background:rgba(2,6,23,.9); border:1px solid rgba(139,92,246,.3); border-radius:12px; color:white; outline:none; }
        input:focus{ border-color:#8b5cf6; box-shadow:0 0 0 3px rgba(139,92,246,.2); }
        button{ width:100%; padding:12px; border:none; border-radius:12px; background:linear-gradient(90deg,#6366f1,#8b5cf6); color:white; font-weight:600; cursor:pointer; }
        .toggle{ text-align:center; margin-top:14px; color:#a5b4fc; cursor:pointer; }
        #error{ color:#f87171; margin-top:12px; }
        .password-rules{ margin-top:-4px; margin-bottom:14px; padding-left:18px; color:#cbd5e1; font-size:14px; }
        .valid{ color:#4ade80; }
    </style>
</head>
<body>
<div class="auth-box">
    <h3 id="title">Login</h3>
    <input id="username" placeholder="Username">
    <input id="email" placeholder="Email" style="display:none;">
    <input id="password" type="password" placeholder="Password">
    <ul class="password-rules" id="passwordRules" style="display:none;">
        <li id="lengthRule">Має містити мінімум 8 символів</li>
        <li id="lowerRule">Має містити малу літеру</li>
        <li id="upperRule">Має містити велику літеру</li>
        <li id="numberRule">Має містити цифру</li>
        <li id="specialRule">Має містити спеціальний знак</li>
    </ul>
    <button onclick="submitForm()">Continue</button>
    <p id="error"></p>
    <div class="toggle" id="toggleText" onclick="toggleMode()">
        Switch to Register
    </div>
</div>
<script>
let isLogin = true;
function toggleMode(){
    isLogin = !isLogin;
    document.getElementById("title").innerText =
        isLogin ? "Login" : "Register";
    document.getElementById("email").style.display =
        isLogin ? "none" : "block";
    document.getElementById("passwordRules").style.display =
        isLogin ? "none" : "block";
    document.getElementById("toggleText").innerText =
        isLogin ? "Switch to Register" : "Switch to Login";
    document.getElementById("error").innerText = "";
}
function isValidEmail(email){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}
function isStrongPassword(password){
    return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/.test(password);
}
async function submitForm(){
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    let url = "";
    let body = {};
    document.getElementById("error").innerText = "";
    if(isLogin){
        url = CONFIG.API_BASE + "/token/";
        body = { username, password };
    } else {
        if(!isValidEmail(email)){
            document.getElementById("error").innerText = "Invalid email format";
            return;
        }
        if(!isStrongPassword(password)){
            document.getElementById("error").innerText = "Weak password";
            return;
        }
        url = CONFIG.API_BASE + "/register/";
        body = { username, email, password };
    }
    const res = await fetch(url,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(body)
    });
    const data = await res.json();
    if(!res.ok){
    if(isLogin){
        document.getElementById("error").innerText = "Invalid email or password";
    } else {
        document.getElementById("error").innerText = data.detail || "Registration failed";
    }
    return;
}
    localStorage.setItem("access", data.access);
    localStorage.setItem("refresh", data.refresh);
    window.location.href = "/app/";
}
</script>
<script src="{% static 'config.js' %}"></script>
</body>
</html>
