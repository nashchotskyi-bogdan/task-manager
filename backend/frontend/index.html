<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Task Manager Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
    --bg-primary:#030712;
    --bg-secondary:#0b1120;
    --bg-card:rgba(15,23,42,0.85);
    --border:rgba(99,102,241,0.25);
    --border-hover:rgba(129,140,248,0.45);
    --text-primary:#f8fafc;
    --text-muted:#94a3b8;
}
body {
    font-family: Inter, "Segoe UI", sans-serif;
    background: linear-gradient(135deg,#020617 0%,#0b1120 100%);
    color: var(--text-primary);
}
.navbar {
    background: rgba(2,6,23,0.9);
    padding: 1rem;
}
.container {
    max-width: 1400px;
    padding: 2rem;
}
.card {
    background: rgba(15,23,42,0.9);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1rem;
}
.task-card {
    background: rgba(15,23,42,0.95);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1rem;
    margin-bottom: 1rem;
}
.modal-box {
    display:none;
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:420px;
    background:#0f172a;
    padding:2rem;
    border-radius:20px;
    z-index:1000;
}
h5 {
    color: #ffffff !important;
}
#projectsList, #categoriesList {
    color: #ffffff !important;
}
</style>
</head>
<body>
<!-- navbar -->
<nav class="navbar d-flex justify-content-between">
    <span class="navbar-brand text-white">Task Manager</span>
    <button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button>
</nav>
<div class="container">

<!-- tasks -->
<div class="card mb-3">
    <h5>Tasks</h5>
    <input id="searchInput" class="form-control mb-2" placeholder="Search..." onkeyup="loadTasks()">
    <div class="row g-2">
        <div class="col-md-4">
            <input id="title" class="form-control" placeholder="Title">
        </div>
        <div class="col-md-4">
            <input id="description" class="form-control" placeholder="Description">
        </div>
        <div class="col-md-2">
            <select id="project" class="form-select"></select>
        </div>
        <div class="col-md-2">
            <select id="category" class="form-select"></select>
        </div>
    </div>

    <button class="btn btn-primary w-100 mt-2" onclick="createTask()">+ Task</button>
</div>

<!-- projects -->
<div class="card mb-3">
    <h5>Projects</h5>
    <div class="d-flex gap-2 mb-2">
        <input id="projectName" class="form-control" placeholder="New project">
        <button class="btn btn-success" onclick="createProject()">Add</button>
    </div>
    <div id="projectsList"></div>
</div>
<!-- categories -->
<div class="card mb-3">
    <h5>Categories</h5>
    <div class="d-flex gap-2 mb-2">
        <input id="categoryName" class="form-control" placeholder="New category">
        <button class="btn btn-success" onclick="createCategory()">Add</button>
    </div>
    <div id="categoriesList"></div>
</div>
<div id="tasks" class="row"></div>
</div>
<!-- edit_modal -->
<div id="editModal" class="modal-box">
    <h5>Edit Task</h5>
    <input id="editTitle" class="form-control mb-2">
    <input id="editDescription" class="form-control mb-2">
    <button class="btn btn-primary w-100" onclick="saveEdit()">Save</button>
</div>
<script>
const API = "http://127.0.0.1:8000/api/tasks/";
const PROJECTS_API = "http://127.0.0.1:8000/api/projects/";
const CATEGORIES_API = "http://127.0.0.1:8000/api/categories/";
let tasks = [];
let editingTask = null;
const $ = id => document.getElementById(id);
function auth() {
    const token = localStorage.getItem("access");
    return {
        "Content-Type": "application/json",
        ...(token && { "Authorization": "Bearer " + token })
    };
}
/* tasks */
async function loadTasks() {
    const res = await fetch(API, { headers: auth() });
    tasks = await res.json();
    renderTasks(tasks);
}
function renderTasks(data) {
    $("tasks").innerHTML = data.map(t => `
        <div class="col-md-4">
            <div class="task-card">
                <h5>${t.title}</h5>
                <p>${t.description}</p>
                <button class="btn btn-warning btn-sm" onclick="editTask(${t.id})">Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">Delete</button>
            </div>
        </div>
    `).join("");
}
async function createTask() {
    await fetch(API, {
        method:"POST",
        headers:auth(),
        body:JSON.stringify({
            title:$("title").value,
            description:$("description").value,
            project:$("project").value || null,
            category:$("category").value || null
        })
    });
    loadTasks();
}
/* projects */
async function loadProjects() {
    const res = await fetch(PROJECTS_API, { headers: auth() });
    const data = await res.json();
    $("project").innerHTML = data.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
    $("projectsList").innerHTML = data.map(p => `
        <div class="d-flex justify-content-between mb-1">
            ${p.name}
            <div>
                <button onclick="editProject(${p.id}, '${p.name}')" class="btn btn-sm btn-warning">✏️</button>
                <button onclick="deleteProject(${p.id})" class="btn btn-sm btn-danger">🗑</button>
            </div>
        </div>
    `).join("");
}
async function createProject() {
    await fetch(PROJECTS_API,{
        method:"POST",
        headers:auth(),
        body:JSON.stringify({ name:$("projectName").value })
    });
    loadProjects();
}
async function editProject(id,name){
    const newName = prompt("Edit project:", name);
    if(!newName) return;
    await fetch(PROJECTS_API+id+"/",{
        method:"PATCH",
        headers:auth(),
        body:JSON.stringify({ name:newName })
    });
    loadProjects();
}
async function deleteProject(id){
    await fetch(PROJECTS_API+id+"/",{
        method:"DELETE",
        headers:auth()
    });
    loadProjects();
}
/* categories */
async function loadCategories() {
    const res = await fetch(CATEGORIES_API,{ headers:auth() });
    const data = await res.json();
    $("category").innerHTML = data.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
    $("categoriesList").innerHTML = data.map(c => `
        <div class="d-flex justify-content-between mb-1">
            ${c.name}
            <div>
                <button onclick="editCategory(${c.id}, '${c.name}')" class="btn btn-sm btn-warning">✏️</button>
                <button onclick="deleteCategory(${c.id})" class="btn btn-sm btn-danger">🗑</button>
            </div>
        </div>
    `).join("");
}
async function createCategory(){
    await fetch(CATEGORIES_API,{
        method:"POST",
        headers:auth(),
        body:JSON.stringify({ name:$("categoryName").value })
    });
    loadCategories();
}
async function editCategory(id,name){
    const newName = prompt("Edit category:", name);
    if(!newName) return;
    await fetch(CATEGORIES_API+id+"/",{
        method:"PATCH",
        headers:auth(),
        body:JSON.stringify({ name:newName })
    });
    loadCategories();
}
async function deleteCategory(id){
    await fetch(CATEGORIES_API+id+"/",{
        method:"DELETE",
        headers:auth()
    });
    loadCategories();
}
/* task_delete */
async function deleteTask(id){
    await fetch(API+id+"/",{ method:"DELETE", headers:auth() });
    loadTasks();
}
/* init */
document.addEventListener("DOMContentLoaded",()=>{
    loadTasks();
    loadProjects();
    loadCategories();
});
function logout(){
    localStorage.clear();
    location.href="login.html";
}
function editTask(id){
    const t = tasks.find(x=>x.id===id);
    editingTask = t;
    $("editTitle").value = t.title;
    $("editDescription").value = t.description;
    $("editModal").style.display="block";
}
async function saveEdit(){
    await fetch(API+editingTask.id+"/",{
        method:"PATCH",
        headers:auth(),
        body:JSON.stringify({
            title:$("editTitle").value,
            description:$("editDescription").value
        })
    });
    $("editModal").style.display="none";
    loadTasks();
}
</script>
</body>
</html>
