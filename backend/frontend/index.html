<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Task Manager Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<nav class="navbar d-flex justify-content-between">
    <span class="navbar-brand">Task Manager</span>
    <div class="d-flex gap-2">
        <button class="btn btn-outline-light btn-sm" onclick="toggleView()">
            Group View
        </button>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">
            Logout
        </button>
    </div>
</nav>
<div class="container mt-4">
    <input id="searchInput"
           placeholder="Search tasks..."
           onkeyup="loadTasks()"
           class="form-control mb-3">
    <div class="card mt-3 mb-4 p-3">
        <div class="row g-2">
            <div class="col-md-4">
                <input id="title" class="form-control" placeholder="Title">
            </div>
            <div class="col-md-4">
                <input id="description" class="form-control" placeholder="Description">
            </div>
            <div class="col-md-2">
                <select id="project" class="form-select">
                    <option value="">Project</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="category" class="form-select">
                    <option value="">Category</option>
                </select>
            </div>
        </div>
        <button class="btn btn-primary mt-3 w-100" onclick="createTask()">
            + Add Task
        </button>
    </div>
    <div id="tasks" class="row"></div>
</div>
<div id="editModal" class="modal-box">
    <h5 class="mb-3">Edit Task</h5>
    <input id="editTitle" class="form-control mb-3" placeholder="Task title">
    <input id="editDescription" class="form-control mb-4" placeholder="Task description">
    <div class="d-flex gap-2">
        <button class="btn btn-primary flex-fill" onclick="saveEdit()">Save</button>
        <button class="btn btn-secondary flex-fill" onclick="closeEdit()">Cancel</button>
    </div>
</div>
<script>
const API = "http://127.0.0.1:8000/api/tasks/";
const PROJECTS_API = "http://127.0.0.1:8000/api/projects/";
const CATEGORIES_API = "http://127.0.0.1:8000/api/categories/";
let editingTask = null;
let tasks = [];
let viewMode = "all"; // 🔥 NEW
const $ = (id) => document.getElementById(id);
function authHeader() {
    return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("access")
    };
}
/* toggle */
function toggleView() {
    viewMode = viewMode === "all" ? "grouped" : "all";
    renderTasks(tasks);
}

/* create */
async function createTask() {
    const payload = {
        title: $("title").value.trim(),
        description: $("description").value.trim(),
        project: $("project").value ? Number($("project").value) : null,
        category: $("category").value ? Number($("category").value) : null,
        completed: false
    };
    await fetch(API, {
        method: "POST",
        headers: authHeader(),
        body: JSON.stringify(payload)
    });
    $("title").value = "";
    $("description").value = "";
    loadTasks();
}

/* load */
async function loadTasks() {
    const res = await fetch(API, { headers: authHeader() });
    let data = await res.json();
    tasks = data;
    const q = $("searchInput").value?.toLowerCase();
    if (q) {
        data = data.filter(t =>
            t.title.toLowerCase().includes(q) ||
            (t.description || "").toLowerCase().includes(q)
        );
    }
    renderTasks(data);
}

/* group_by_project */
function groupByProject(list) {
    const grouped = {};
    list.forEach(t => {
        const key = t.project_name || "No Project";
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(t);
    });
    return grouped;
}

/* render */
function renderTasks(data) {
    if (!data.length) {
        $("tasks").innerHTML = `<div class="text-muted">No tasks</div>`;
        return;
    }

    /* grouped_view */
    if (viewMode === "grouped") {
        const grouped = groupByProject(data);
        $("tasks").innerHTML = Object.entries(grouped).map(([project, items]) => `
            <div class="col-12 mb-4">
                <h4 class="mb-3">${project}</h4>
                <div class="row">
                    ${items.map(task => taskCard(task)).join("")}
                </div>
            </div>
        `).join("");
        return;
    }

    /* normal_view */
    $("tasks").innerHTML = data.map(taskCard).join("");
}

/* task_card */
function taskCard(task) {
    return `
    <div class="col-md-4 mb-3">
        <div class="task-card">
            <h5>${task.title}</h5>
            <p>${task.description || ""}</p>
            <p class="small text-muted mb-1">
                Project: ${task.project_name || "None"}
            </p>
            <p class="small text-muted mb-2">
                Category: ${task.category_name || "None"}
            </p>
            <span class="badge bg-${task.completed ? "success" : "secondary"}">
                ${task.completed ? "Done" : "Active"}
            </span>
            <div class="mt-2 d-flex gap-2 flex-wrap">
                <button class="btn btn-warning btn-sm"
                    onclick="openEdit(${task.id})">Edit</button>
                <button class="btn btn-${task.completed ? "secondary" : "success"} btn-sm"
    onclick="toggleTask(${task.id}, ${task.completed})">
    ${task.completed ? "Mark as Inactive" : "Complete"}
</button>
                <button class="btn btn-danger btn-sm"
                    onclick="deleteTask(${task.id})">Delete</button>
            </div>
        </div>
    </div>`;
}

/* delete/toggle */
async function deleteTask(id) {
    await fetch(API + id + "/", {
        method: "DELETE",
        headers: authHeader()
    });
    loadTasks();
}
async function toggleTask(id, current) {
    await fetch(API + id + "/", {
        method: "PATCH",
        headers: authHeader(),
        body: JSON.stringify({ completed: !current })
    });
    loadTasks();
}

/* edit */
async function openEdit(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) {
        console.error("Task not found:", id);
        return;
    }
    editingTask = task;
    $("editTitle").value = task.title || "";
    $("editDescription").value = task.description || "";
    $("editModal").style.display = "block";
}

async function saveEdit() {
    const res = await fetch(API + editingTask.id + "/", {
        method: "PATCH",
        headers: authHeader(),
        body: JSON.stringify({
            title: $("editTitle").value,
            description: $("editDescription").value
        })
    });
    const updated = await res.json();
    closeEdit();
    loadTasks();
}

/* load_selects*/
async function loadProjects() {
    const res = await fetch(PROJECTS_API, { headers: authHeader() });
    const data = await res.json();
    $("project").innerHTML =
        `<option value="">Project</option>` +
        data.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
}

async function loadCategories() {
    const res = await fetch(CATEGORIES_API, { headers: authHeader() });
    const data = await res.json();
    $("category").innerHTML =
        `<option value="">Category</option>` +
        data.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
}

/* logout */
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}

/* init */
document.addEventListener("DOMContentLoaded", () => {
    loadTasks();
    loadProjects();
    loadCategories();
});
</script>
</body>
</html>
