<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Task Manager Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --bg-primary: #030712;
    --bg-secondary: #0b1120;
    --bg-card: rgba(15, 23, 42, 0.85);
    --border: rgba(99, 102, 241, 0.25);
    --border-hover: rgba(129, 140, 248, 0.45);
    --text-primary: #f8fafc;
    --text-secondary: #cbd5e1;
    --text-muted: #94a3b8;
    --accent: #6366f1;
    --accent-light: #8b5cf6;
    --shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    --shadow-hover: 0 25px 50px rgba(99, 102, 241, 0.18);
    --transition: all 0.3s ease;
}

/* body */
body {
    font-family: Inter, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #020617 0%, #0b1120 100%);
    color: var(--text-primary);
    min-height: 100vh;
}

/* navbar */
.navbar {
    background: rgba(2, 6, 23, 0.9);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(99, 102, 241, 0.2);
    padding: 1.25rem 1.75rem;
}

.navbar-brand {
    color: var(--text-primary) !important;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    cursor: default;
    user-select: none;
}

.navbar-brand:hover,
.navbar-brand:focus,
.navbar-brand:active {
    color: var(--text-primary) !important;
    text-decoration: none;
}

/* container */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
}

/* search */
#searchInput {
    width: 100%;
    padding: 1rem 1.2rem;
    border-radius: 14px;
    border: 1px solid rgba(148, 163, 184, 0.2);
    background: rgba(30, 41, 59, 0.6);
    color: var(--text-primary);
    outline: none;
}

#searchInput::placeholder {
    color: var(--text-muted);
}

/* card*/
.card {
    background: rgba(15, 23, 42, 0.9);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.5rem;
}

/* task_grid */
#tasks {
    margin-top: 2rem;
}

/* task_card */
.task-card {
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.5rem;
    transition: var(--transition);
    height: auto;
    overflow: hidden;
}

.task-card:hover {
    transform: translateY(-6px);
    border-color: var(--border-hover);
    box-shadow: var(--shadow-hover);
}

.task-card h5,
.task-card p {
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
}

.task-meta {
    margin-top: 0.5rem;
    margin-bottom: 0.6rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.meta-line {
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.1;
    margin: 0;
}
/* text_fix */
.text-muted {
    text-align: center;
    width: 100%;
    font-size: 1.1rem;
    color: var(--text-muted) !important;
    padding: 3rem 0;
}

/* badges */
.badge {
    border-radius: 999px;
    padding: 0.5rem 0.8rem;
}

/* buttons */
.btn {
    border-radius: 12px;
}

/* modal */
.modal-box {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
    background: #0f172a;
    padding: 2rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    z-index: 1000;
}
    </style>
</head>
<body>
<nav class="navbar d-flex justify-content-between">
    <span class="navbar-brand">Task Manager</span>
    <div class="d-flex gap-2">
        <button class="btn btn-outline-light btn-sm" onclick="toggleView()">
            Group View
        </button>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">
            Logout
        </button>
    </div>
</nav>
<div class="container mt-4">
    <input id="searchInput"
           placeholder="Search tasks..."
           onkeyup="loadTasks()"
           class="form-control mb-3">
    <div class="card mt-3 mb-4 p-3">
        <div class="row g-2">
            <div class="col-md-4">
                <input id="title" class="form-control" placeholder="Title">
            </div>
            <div class="col-md-4">
                <input id="description" class="form-control" placeholder="Description">
            </div>
            <div class="col-md-2">
                <select id="project" class="form-select">
                    <option value="">Project</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="category" class="form-select">
                    <option value="">Category</option>
                </select>
            </div>
        </div>
        <button class="btn btn-primary mt-3 w-100" onclick="createTask()">
            + Add Task
        </button>
    </div>
    <div id="tasks" class="row"></div>
</div>
<div id="editModal" class="modal-box">
    <h5 class="mb-3">Edit Task</h5>
    <input id="editTitle" class="form-control mb-3" placeholder="Task title">
    <input id="editDescription" class="form-control mb-4" placeholder="Task description">
    <div class="d-flex gap-2">
        <button class="btn btn-primary flex-fill" onclick="saveEdit()">Save</button>
        <button class="btn btn-secondary flex-fill" onclick="closeEdit()">Cancel</button>
    </div>
</div>
<script>
const API = "http://127.0.0.1:8000/api/tasks/";
const PROJECTS_API = "http://127.0.0.1:8000/api/projects/";
const CATEGORIES_API = "http://127.0.0.1:8000/api/categories/";
let editingTask = null;
let tasks = [];
let viewMode = "all"; // 🔥 NEW
const $ = (id) => document.getElementById(id);
function authHeader() {
    return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("access")
    };
}
/* toggle */
function toggleView() {
    viewMode = viewMode === "all" ? "grouped" : "all";
    renderTasks(tasks);
}

/* create */
async function createTask() {
    const payload = {
        title: $("title").value.trim(),
        description: $("description").value.trim(),
        project: $("project").value ? Number($("project").value) : null,
        category: $("category").value ? Number($("category").value) : null,
        completed: false
    };
    await fetch(API, {
        method: "POST",
        headers: authHeader(),
        body: JSON.stringify(payload)
    });
    $("title").value = "";
    $("description").value = "";
    loadTasks();
}

/* load */
async function loadTasks() {
    const res = await fetch(API, { headers: authHeader() });
    let data = await res.json();
    tasks = data;
    const q = $("searchInput").value?.toLowerCase();
    if (q) {
        data = data.filter(t =>
            t.title.toLowerCase().includes(q) ||
            (t.description || "").toLowerCase().includes(q)
        );
    }
    renderTasks(data);
}

/* group_by_project */
function groupByProject(list) {
    const grouped = {};
    list.forEach(t => {
        const key = t.project_name || "No Project";
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(t);
    });
    return grouped;
}

/* render */
function renderTasks(data) {
    if (!data.length) {
        $("tasks").innerHTML = `<div class="text-muted">No tasks</div>`;
        return;
    }

    /* grouped_view */
    if (viewMode === "grouped") {
        const grouped = groupByProject(data);
        $("tasks").innerHTML = Object.entries(grouped).map(([project, items]) => `
            <div class="col-12 mb-4">
                <h4 class="mb-3">${project}</h4>
                <div class="row">
                    ${items.map(task => taskCard(task)).join("")}
                </div>
            </div>
        `).join("");
        return;
    }

    /* normal_view */
    $("tasks").innerHTML = data.map(taskCard).join("");
}

/* task_card */
function taskCard(task) {
    return `
    <div class="col-md-4 mb-3">
        <div class="task-card">
            <h5>${task.title}</h5>
            <p>${task.description || ""}</p>
            <p class="small text-muted mb-1">
                Project: ${task.project_name || "None"}
            </p>
            <p class="small text-muted mb-2">
                Category: ${task.category_name || "None"}
            </p>
            <span class="badge bg-${task.completed ? "success" : "secondary"}">
                ${task.completed ? "Done" : "Active"}
            </span>
            <div class="mt-2 d-flex gap-2 flex-wrap">
                <button class="btn btn-warning btn-sm"
                    onclick="openEdit(${task.id})">Edit</button>
                <button class="btn btn-${task.completed ? "secondary" : "success"} btn-sm"
    onclick="toggleTask(${task.id}, ${task.completed})">
    ${task.completed ? "Mark as Inactive" : "Complete"}
</button>
                <button class="btn btn-danger btn-sm"
                    onclick="deleteTask(${task.id})">Delete</button>
            </div>
        </div>
    </div>`;
}

/* delete/toggle */
async function deleteTask(id) {
    await fetch(API + id + "/", {
        method: "DELETE",
        headers: authHeader()
    });
    loadTasks();
}
async function toggleTask(id, current) {
    await fetch(API + id + "/", {
        method: "PATCH",
        headers: authHeader(),
        body: JSON.stringify({ completed: !current })
    });
    loadTasks();
}

/* edit */
async function openEdit(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) {
        console.error("Task not found:", id);
        return;
    }
    editingTask = task;
    $("editTitle").value = task.title || "";
    $("editDescription").value = task.description || "";
    $("editModal").style.display = "block";
}

async function saveEdit() {
    const res = await fetch(API + editingTask.id + "/", {
        method: "PATCH",
        headers: authHeader(),
        body: JSON.stringify({
            title: $("editTitle").value,
            description: $("editDescription").value
        })
    });
    const updated = await res.json();
    closeEdit();
    loadTasks();
}

/* load_selects*/
async function loadProjects() {
    const res = await fetch(PROJECTS_API, { headers: authHeader() });
    const data = await res.json();
    $("project").innerHTML =
        `<option value="">Project</option>` +
        data.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
}

async function loadCategories() {
    const res = await fetch(CATEGORIES_API, { headers: authHeader() });
    const data = await res.json();
    $("category").innerHTML =
        `<option value="">Category</option>` +
        data.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
}

/* logout */
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}

/* init */
document.addEventListener("DOMContentLoaded", () => {
    loadTasks();
    loadProjects();
    loadCategories();
});
</script>
</body>
</html>
