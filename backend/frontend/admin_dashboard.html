<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at top, #1b1642, #070a1a 70%);
            color: #e5e7eb;
        }
        .navbar {
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(139, 92, 246, 0.25);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h2 { margin: 0; color: #a5b4fc; }
        .navbar a {
            color: #a5b4fc;
            text-decoration: none;
            margin-left: 20px;
        }
        .navbar a:hover { color: #8b5cf6; }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(139, 92, 246, 0.25);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            padding: 30px;
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card h3 {
            color: #a5b4fc;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .stat-card .number {
            font-size: 48px;
            font-weight: 700;
            color: #8b5cf6;
        }
        .action-btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .action-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>🛡️ Admin Panel</h2>
        <div>
            <a href="/app/">← Back to App</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="number" id="totalUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>Active Users</h3>
                <div class="number" id="activeUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>Logged In (15min)</h3>
                <div class="number" id="loggedInUsers">-</div>
            </div>
        </div>
        
        <div style="text-align: center;">
            <a href="/admin/users/" class="action-btn">Manage Users →</a>
        </div>
    </div>

    <script src="{% static 'config.js' %}"></script>
    <script>
        async function loadStats() {
            const token = localStorage.getItem("access");
            if (!token) {
                window.location.href = "/";
                return;
            }
            
            try {
                const res = await fetch(CONFIG.API_BASE + "/admin/stats/", {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                
                if (res.status === 403) {
                    alert("Access denied. Admin only.");
                    window.location.href = "/app/";
                    return;
                }
                
                const data = await res.json();
                document.getElementById("totalUsers").innerText = data.total_users;
                document.getElementById("activeUsers").innerText = data.active_users;
                document.getElementById("loggedInUsers").innerText = data.logged_in_users;
            } catch (err) {
                console.error(err);
            }
        }
        
        function logout() {
            localStorage.removeItem("access");
            localStorage.removeItem("refresh");
            window.location.href = "/";
        }
        
        loadStats();
    </script>
</body>
</html>
