<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at top, #1b1642, #070a1a 70%);
            color: #e5e7eb;
        }
        .navbar {
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(139, 92, 246, 0.25);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h2 { margin: 0; color: #a5b4fc; }
        .navbar a {
            color: #a5b4fc;
            text-decoration: none;
            margin-left: 20px;
        }
        .navbar a:hover { color: #8b5cf6; }
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px;
            background: rgba(2, 6, 23, 0.9);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            color: white;
            outline: none;
        }
        .search-input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }
        table {
            width: 100%;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(14px);
        }
        th {
            background: rgba(139, 92, 246, 0.15);
            padding: 15px;
            text-align: left;
            cursor: pointer;
            user-select: none;
            color: #a5b4fc;
            font-weight: 600;
        }
        th:hover { background: rgba(139, 92, 246, 0.25); }
        th .sort-icon { margin-left: 5px; opacity: 0.5; }
        th.active .sort-icon { opacity: 1; }
        td {
            padding: 12px 15px;
            border-top: 1px solid rgba(139, 92, 246, 0.1);
        }
        tr:hover { background: rgba(139, 92, 246, 0.05); }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-active { background: #4ade80; color: #052e16; }
        .badge-inactive { background: #f87171; color: #450a0a; }
        .badge-staff { background: #8b5cf6; color: white; }
        .delete-btn {
            padding: 6px 14px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .delete-btn:hover { background: #b91c1c; }
        .delete-btn:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>👥 Manage Users</h2>
        <div>
            <a href="/admin/">← Dashboard</a>
            <a href="/app/">App</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>
    
    <div class="container">
        <div class="controls">
            <input 
                type="text" 
                class="search-input" 
                id="searchInput" 
                placeholder="🔍 Search by username, email, name..."
                oninput="debounceSearch()"
            >
        </div>
        
        <table>
            <thead>
                <tr>
                    <th onclick="sortBy('username')">
                        Username <span class="sort-icon">↕</span>
                    </th>
                    <th onclick="sortBy('email')">
                        Email <span class="sort-icon">↕</span>
                    </th>
                    <th>Name</th>
                    <th onclick="sortBy('is_active')">
                        Status <span class="sort-icon">↕</span>
                    </th>
                    <th>Role</th>
                    <th onclick="sortBy('date_joined')">
                        Joined <span class="sort-icon">↕</span>
                    </th>
                    <th onclick="sortBy('last_login')">
                        Last Login <span class="sort-icon">↕</span>
                    </th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersTable">
                <tr><td colspan="8" style="text-align:center;">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="{% static 'config.js' %}"></script>
    <script>
        let currentSort = "username";
        let currentOrder = "asc";
        let searchTimeout = null;
        
        async function loadUsers() {
            const token = localStorage.getItem("access");
            if (!token) {
                window.location.href = "/";
                return;
            }
            
            const search = document.getElementById("searchInput").value;
            const url = `${CONFIG.API_BASE}/admin/users/?search=${encodeURIComponent(search)}&sort=${currentSort}&order=${currentOrder}`;
            
            try {
                const res = await fetch(url, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                
                if (res.status === 403) {
                    alert("Access denied. Admin only.");
                    window.location.href = "/app/";
                    return;
                }
                
                const users = await res.json();
                renderTable(users);
            } catch (err) {
                console.error(err);
            }
        }
        
        function renderTable(users) {
            const tbody = document.getElementById("usersTable");
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">No users found</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td><strong>${escapeHtml(u.username)}</strong></td>
                    <td>${escapeHtml(u.email)}</td>
                    <td>${escapeHtml(u.first_name + ' ' + u.last_name)}</td>
                    <td>
                        <span class="badge ${u.is_active ? 'badge-active' : 'badge-inactive'}">
                            ${u.is_active ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td>
                        ${u.is_staff ? '<span class="badge badge-staff">Staff</span>' : 'User'}
                    </td>
                    <td>${formatDate(u.date_joined)}</td>
                    <td>${u.last_login ? formatDate(u.last_login) : 'Never'}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteUser(${u.id}, '${escapeHtml(u.username)}')">
                            Delete
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function sortBy(field) {
            if (currentSort === field) {
                currentOrder = currentOrder === "asc" ? "desc" : "asc";
            } else {
                currentSort = field;
                currentOrder = "asc";
            }
            loadUsers();
        }
        
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadUsers, 300);
        }
        
        async function deleteUser(userId, username) {
            // підтвердження_перед_видаленням
            const confirmed = confirm(
                `⚠️ Are you sure you want to delete user "${username}"?\n\nThis action cannot be undone.`
            );
            
            if (!confirmed) return;
            
            const token = localStorage.getItem("access");
            
            try {
                const res = await fetch(
                    `${CONFIG.API_BASE}/admin/users/${userId}/delete/`,
                    {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${token}`,
                            "Content-Type": "application/json"
                        }
                    }
                );
                
                const data = await res.json();
                
                if (res.ok) {
                    alert(` User "${username}" deleted successfully`);
                    loadUsers();  // Перезавантажити таблицю
                } else {
                    alert(` Error: ${data.detail}`);
                }
            } catch (err) {
                alert(" Failed to delete user");
                console.error(err);
            }
        }
        
        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function logout() {
            localStorage.removeItem("access");
            localStorage.removeItem("refresh");
            window.location.href = "/";
        }
        
        loadUsers();
    </script>
</body>
</html>
